<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>yourclaw.lol</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #050505;
      color: #e5e5e5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .bg {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(140px);
      animation: drift 20s ease-in-out infinite alternate;
    }

    .orb-1 {
      width: 500px;
      height: 500px;
      background: #dc2626;
      opacity: 0.25;
      top: -150px;
      right: -50px;
      animation-duration: 18s;
    }

    .orb-2 {
      width: 400px;
      height: 400px;
      background: #991b1b;
      opacity: 0.3;
      bottom: -100px;
      left: -50px;
      animation-duration: 22s;
      animation-delay: -5s;
    }

    .orb-3 {
      width: 300px;
      height: 300px;
      background: #b91c1c;
      opacity: 0.15;
      top: 40%;
      left: 55%;
      animation-duration: 25s;
      animation-delay: -10s;
    }

    @keyframes drift {
      0% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(50px, -40px) scale(1.08); }
      66% { transform: translate(-40px, 50px) scale(0.92); }
      100% { transform: translate(30px, 20px) scale(1.04); }
    }

    .container {
      text-align: center;
      position: relative;
      z-index: 1;
      animation: fadeIn 1.2s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(24px); }
      to { opacity: 1; transform: translateY(0); }
    }

    h1 {
      font-size: 3.5rem;
      font-weight: 700;
      color: #ffffff;
      line-height: 1.1;
      letter-spacing: -0.03em;
      margin-bottom: 0.3rem;
    }

    h1 span {
      display: block;
      font-weight: 300;
      color: #737373;
    }

    .subtitle {
      font-size: 1.05rem;
      color: #737373;
      margin-top: 1.2rem;
      margin-bottom: 2.5rem;
      line-height: 1.6;
    }

    .cta {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.9rem 2rem;
      background: #dc2626;
      color: #ffffff;
      border: none;
      border-radius: 12px;
      font-size: 1.05rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.25s ease;
      letter-spacing: 0.01em;
    }

    .cta:hover {
      background: #ef4444;
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(220, 38, 38, 0.3);
    }

    .cta .arrow {
      transition: transform 0.25s ease;
      font-size: 1.2rem;
    }

    .cta:hover .arrow {
      transform: translateX(3px);
    }

    .note {
      margin-top: 1.5rem;
      font-size: 0.8rem;
      color: #525252;
      letter-spacing: 0.03em;
    }
  </style>
</head>
<body>
  <div class="bg">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>
  <div class="container">
    <h1>Deploy <span>your clawd</span></h1>
    <p class="subtitle">Your own Claude instance. One click, zero config.</p>
    <button class="cta">
      Start building <span class="arrow">&rarr;</span>
    </button>
    <p class="note">Your own AI infrastructure &middot; Ready in minutes</p>
  </div>
</body>
</html>
