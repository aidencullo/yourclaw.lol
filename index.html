<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>yourclaw.lol</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #050505;
      color: #e5e5e5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.4;
      animation: drift 20s ease-in-out infinite alternate;
    }

    .orb-1 {
      width: 600px;
      height: 600px;
      background: #e44d26;
      top: -200px;
      right: -100px;
      animation-duration: 18s;
    }

    .orb-2 {
      width: 500px;
      height: 500px;
      background: #7c3aed;
      bottom: -150px;
      left: -100px;
      animation-duration: 22s;
      animation-delay: -5s;
    }

    .orb-3 {
      width: 400px;
      height: 400px;
      background: #06b6d4;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      animation-duration: 25s;
      animation-delay: -10s;
    }

    @keyframes drift {
      0% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(40px, -30px) scale(1.05); }
      66% { transform: translate(-30px, 40px) scale(0.95); }
      100% { transform: translate(20px, 20px) scale(1.02); }
    }

    .container {
      text-align: center;
      position: relative;
      z-index: 1;
      animation: fadeIn 1.2s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .tagline {
      font-size: 1.4rem;
      color: #a3a3a3;
      font-weight: 300;
      margin-bottom: 3rem;
      letter-spacing: 0.02em;
    }

    .tagline strong {
      color: #ffffff;
      font-weight: 600;
    }

    .cta {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      padding: 1rem 2.2rem;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.12);
      color: #ffffff;
      border-radius: 14px;
      font-size: 1.05rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s ease;
      backdrop-filter: blur(12px);
    }

    .cta:hover {
      background: rgba(255, 255, 255, 0.14);
      border-color: rgba(255, 255, 255, 0.25);
      transform: translateY(-1px);
    }

    .cta .arrow {
      transition: transform 0.3s ease;
    }

    .cta:hover .arrow {
      transform: translateX(3px);
    }

    .beta {
      margin-top: 2rem;
      font-size: 0.75rem;
      color: #525252;
      text-transform: uppercase;
      letter-spacing: 0.15em;
    }
  </style>
</head>
<body>
  <div class="bg">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>
  <div class="container">
    <p class="tagline"><strong>Your own Claude instance.</strong> One click. No setup.</p>
    <button class="cta">
      Try it now <span class="arrow">&rarr;</span>
    </button>
  </div>
</body>
</html>
